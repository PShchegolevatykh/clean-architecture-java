services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:h2:mem:flashcardsdb
      - DATABASE_USER=sa
      - DATABASE_PASSWORD=password
      - PORT=8080
      - JWT_SECRET=very-long-and-secure-secret-key-at-least-256-bits
      - CLIENT_ID=client-id
      - CLIENT_SECRET=client-secret
